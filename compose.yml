services:
  luna3server:
    build: .
    image: imranwebstudio/luna3server:latest
    platform: linux/amd64
    container_name: luna3server
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads

volumes:
  uploads: